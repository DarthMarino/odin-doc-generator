name: Build Docs

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar clang

      - name: Download and install Odin
        run: |
          mkdir -p /opt/odin
          wget https://github.com/odin-lang/Odin/releases/download/dev-2026-03/odin-linux-amd64-dev-2026-03.tar.gz
          tar -xzf odin-linux-amd64-dev-2026-03.tar.gz -C /opt/odin --strip-components=1
          chmod +x /opt/odin/odin
          rm odin-linux-amd64-dev-2026-03.tar.gz

      - name: Build docs
        env:
          PATH: /opt/odin:$PATH
        run: |
          odin build .
          ./odin-doc-generator --embed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
